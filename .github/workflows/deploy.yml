name: Deploy to GitHub Pages

# Static PWA — no build step (no JS toolchain). We just upload the repo as the Pages artifact.
# GitHub Actions is only doing the publish; there is nothing to compile.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo root; it is already a servable static site.
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
